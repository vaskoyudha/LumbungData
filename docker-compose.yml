version: "3.9"
services:
  couchdb:
    image: couchdb:3
    ports:
      - "5984:5984"
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-changeme}
    volumes:
      - couchdb_data:/opt/couchdb/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 10s
      timeout: 5s
      retries: 5
  besu:
    image: hyperledger/besu:latest
    ports:
      - "8545:8545"
      - "8546:8546"
    command:
      - "--network=dev"
      - "--rpc-http-enabled"
      - "--rpc-http-host=0.0.0.0"
      - "--rpc-http-cors-origins=*"
      - "--rpc-ws-enabled"
      - "--rpc-ws-host=0.0.0.0"
      - "--host-allowlist=*"
volumes:
  couchdb_data:
